<div id="filterDrawer" class="filter-drawer" aria-hidden="true">
  <div class="filter-drawer-overlay"></div>
  <div class="filter-drawer-panel" role="dialog" aria-modal="true" aria-label="Filters">
    <div class="filter-drawer-header">
      <div class="filter-drawer-header-row">
        <h2 class="filter-drawer-title">Filters</h2>
        <button id="closeFilterDrawer" class="filter-drawer-close" type="button" aria-label="Close filters">
          <i class="fas fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="filter-drawer-body">
      <section class="filter-section">
        <h3 class="filter-section-title">
          Sort by
        </h3>
        <div class="custom-dropdown filter-dropdown" id="filterSortDropdown">
          <div class="custom-dropdown-selected" id="filterSortDropdownSelected">
            <span>Random</span>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="custom-dropdown-options" id="filterSortDropdownOptions"></div>
        </div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Platform
        </h3>
        <div id="filterPlatformList" class="filter-platform-grid"></div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Price
        </h3>
        <div class="filter-segmented-control">
          <button class="filter-segment-button is-active" data-price="all" data-default="true" type="button">All</button>
          <button class="filter-segment-button" data-price="free" type="button">Free</button>
          <button class="filter-segment-button" data-price="paid" type="button">Paid</button>
        </div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Type
        </h3>
        <div class="filter-segmented-control">
          <button class="filter-segment-button is-active" data-type="all" data-default="true" type="button">All</button>
          <button class="filter-segment-button" data-type="external" type="button">External</button>
          <button class="filter-segment-button" data-type="executor" type="button">Executor</button>
        </div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Key-System (tasks for free key)
        </h3>
        <div class="filter-segmented-control">
          <button class="filter-segment-button is-active" data-key="all" data-default="true" type="button">All</button>
          <button class="filter-segment-button" data-key="keysystem" type="button">Yes</button>
          <button class="filter-segment-button" data-key="keyless" type="button">No</button>
        </div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Tags
        </h3>
        <div id="filterTagList" class="filter-checkbox-list filter-tag-list"></div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Show only
        </h3>
        <div id="filterShowOnlyList" class="filter-checkbox-list"></div>
      </section>

      <section class="filter-section">
        <h3 class="filter-section-title">
          Updated
        </h3>
        <div class="filter-segmented-control">
          <button class="filter-segment-button is-active" data-updated="all" data-default="true" type="button">All</button>
          <button class="filter-segment-button" data-updated="yes" type="button">Yes</button>
          <button class="filter-segment-button" data-updated="no" type="button">No</button>
        </div>
      </section>

      <section class="filter-section filter-insecure-section">
        <button
          id="revealInsecureHold"
          class="filter-insecure-button"
          type="button"
          aria-pressed="false"
          aria-describedby="revealInsecureHint"
        >
          <span class="filter-insecure-button-copy">
            <span class="filter-insecure-button-topline">
              <span class="filter-insecure-icon" aria-hidden="true">
                <i class="fas fa-triangle-exclamation"></i>
              </span>
              <span id="revealInsecureLabel" class="filter-insecure-button-title">Show warning results</span>
              <span id="revealInsecureCount" class="filter-insecure-badge" hidden>0 warning entries</span>
            </span>
            <span class="filter-insecure-button-subtitle">Include risky or not-yet-verified executors in the catalog results. These stay hidden by default for safety.</span>
          </span>
          <span class="filter-insecure-toggle" aria-hidden="true"></span>
        </button>
        <p id="revealInsecureHint" class="filter-insecure-hint">High-risk or not-yet-verified entries are hidden by default. Turn this on only if you want to review warning results too.</p>
      </section>
    </div>

    <div class="filter-drawer-footer">
      <button id="resetFilters" class="filter-reset-button" type="button">Reset</button>
      <button id="applyFilters" class="filter-apply-button" type="button">Apply Filters</button>
    </div>
  </div>
</div>
