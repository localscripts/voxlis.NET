<div class="promo-hero-section">
  <div class="promo-hero-card">
    <div class="promo-hero-gradient"></div>
    <div class="promo-hero-glow"></div>

    <div class="promo-hero-content">
      <div class="promo-hero-accent-bar"></div>

      <div class="promo-hero-text">
        <h1 class="promo-hero-title">
          Join our <span class="promo-hero-title-accent">Epik Discord</span> Community!
        </h1>

        <p class="promo-hero-description">
          Giveaways, automatic notification for software updates, and more!
        </p>

        <div class="promo-action-row">

          <button
            class="promo-action-button promo-action-button-discord"
            type="button"
            onclick="window.open('https://discord.gg/Ynxbp2YPus', '_blank')"
          >
            <span class="promo-action-icon">
              <i class="fab fa-discord"></i>
            </span>
            <span class="promo-action-label">Discord</span>
            <i class="fas fa-chevron-right promo-action-arrow"></i>
          </button>

          <button
            class="promo-action-button promo-action-button-youtube"
            type="button"
            onclick="window.open('https://www.youtube.com/channel/UCRDj_epbbwvpLTCFDmeL7Zg', '_blank')"
          >
            <span class="promo-action-icon">
              <i class="fab fa-youtube"></i>
            </span>
            <span class="promo-action-label">YouTube</span>
            <i class="fas fa-chevron-right promo-action-arrow"></i>
          </button>

          <button
            class="promo-action-button promo-action-button-trustpilot"
            type="button"
            onclick="window.open('https://www.trustpilot.com/review/voxlis.net', '_blank')"
          >
            <span class="promo-action-icon">
              <i class="fas fa-star"></i>
            </span>
            <span class="promo-action-label">Trustpilot</span>
            <i class="fas fa-chevron-right promo-action-arrow"></i>
          </button>

        </div>
      </div>
    </div>

  </div>
</div>
