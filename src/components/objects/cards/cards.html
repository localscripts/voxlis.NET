<section class="cards-sec" aria-label="Catalog cards" data-catalog-cards-section>
  <div class="cards-body">
    <div class="sts-row" aria-label="Catalog count summary" data-catalog-summary-row>
      <div class="sts-main">
        <div class="sts-txt">
          <span class="catalog-showing-prefix">Showing</span> <span class="fltrd-cnt">0</span> of <span class="ttl-cnt">0</span> <span class="catalog-item-label">entries</span> <span class="page-info">(0-0)</span>
        </div>
      </div>
      <div class="sts-controls">
        <div class="sts-legend" aria-label="Card status legend">
          <span class="sts-legend-item is-updated">
            <span class="sts-legend-swatch updt"></span>
            <span class="sts-legend-label catalog-status-updated-label">Updated</span>
            <span class="sts-legend-count updt-cnt">0</span>
          </span>
          <span class="sts-legend-item is-showing">
            <span class="sts-legend-count show-cnt">Showing 0/0</span>
          </span>
          <span class="sts-legend-item is-not-updated">
            <span class="sts-legend-swatch down"></span>
            <span class="sts-legend-label catalog-status-not-updated-label">Non updated</span>
            <span class="sts-legend-count down-cnt">0</span>
          </span>
        </div>
      </div>
    </div>
    <div class="cards-grid" aria-live="polite"></div>
  </div>
</section>
