<section class="site-themes">
  <div class="footer-theme-drawer" id="siteThemeDrawer" aria-hidden="true">
    <div class="footer-theme-drawer-overlay" data-theme-drawer-close></div>
    <div class="footer-theme-drawer-panel" role="dialog" aria-modal="true" aria-labelledby="siteThemeDrawerTitle">
      <div class="footer-theme-drawer-header">
        <div class="footer-theme-drawer-header-row">
          <h2 class="footer-theme-drawer-title" id="siteThemeDrawerTitle">Themes</h2>
          <div class="footer-theme-drawer-actions">
            <button class="footer-theme-drawer-close" id="closeThemeDrawer" type="button" aria-label="Close themes">
              <i class="fas fa-xmark" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="footer-theme-drawer-body">
        <div class="footer-theme-drawer-tabs" role="tablist" aria-label="Theme tabs">
          <button
            class="footer-theme-drawer-tab is-active"
            id="siteThemeDrawerTabPresets"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="siteThemeDrawerPanelPresets"
            data-theme-tab="presets"
          >
            Presets
          </button>
          <button
            class="footer-theme-drawer-tab"
            id="siteThemeDrawerTabEditor"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="siteThemeDrawerPanelEditor"
            data-theme-tab="editor"
            tabindex="-1"
          >
            Editor
          </button>
        </div>

        <div class="footer-theme-drawer-panels">
          <div
            class="footer-theme-drawer-panel-view is-active"
            id="siteThemeDrawerPanelPresets"
            role="tabpanel"
            aria-labelledby="siteThemeDrawerTabPresets"
            data-theme-panel="presets"
          >
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Visibility</h3>
              <div class="footer-theme-drawer-visibility">
                <label class="footer-theme-drawer-toggle" for="siteHideFeaturedAds">
                  <span class="footer-theme-drawer-toggle-copy">
                    <span class="footer-theme-drawer-toggle-title">Always hide featured ads</span>
                    <span class="footer-theme-drawer-toggle-note">Hide both featured side columns by default.</span>
                  </span>
                  <input class="footer-theme-drawer-toggle-input" id="siteHideFeaturedAds" type="checkbox">
                  <span class="footer-theme-drawer-toggle-ui" aria-hidden="true"></span>
                </label>
                <label class="footer-theme-drawer-toggle" for="siteHidePromo">
                  <span class="footer-theme-drawer-toggle-copy">
                    <span class="footer-theme-drawer-toggle-title">Always hide promo</span>
                    <span class="footer-theme-drawer-toggle-note">Hide the Discord community promo by default.</span>
                  </span>
                  <input class="footer-theme-drawer-toggle-input" id="siteHidePromo" type="checkbox">
                  <span class="footer-theme-drawer-toggle-ui" aria-hidden="true"></span>
                </label>
              </div>
            </section>
            <section class="footer-theme-drawer-section">
              <div class="footer-theme-drawer-options" id="siteThemeOptions"></div>
            </section>
          </div>

          <div
            class="footer-theme-drawer-panel-view"
            id="siteThemeDrawerPanelEditor"
            role="tabpanel"
            aria-labelledby="siteThemeDrawerTabEditor"
            data-theme-panel="editor"
            hidden
          >
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Theme Colors</h3>
              <div id="customThemeMount"></div>
            </section>
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Import / Export</h3>
              <div class="footer-theme-drawer-transfer">
                <label class="footer-theme-drawer-field" for="siteThemeTransferData">
                  <span class="footer-theme-drawer-field-title">Theme data</span>
                  <span class="footer-theme-drawer-field-note">Exports the current editor snapshot as JSON. CSS theme text imports also work.</span>
                  <textarea
                    class="footer-theme-drawer-textarea"
                    id="siteThemeTransferData"
                    placeholder="{&#10;  &quot;type&quot;: &quot;voxlis-theme&quot;,&#10;  &quot;cssText&quot;: &quot;...&quot;&#10;}"
                    spellcheck="false"
                  ></textarea>
                </label>
                <div class="footer-theme-drawer-transfer-actions">
                  <button class="footer-theme-drawer-background-btn is-primary" id="siteThemeExportButton" type="button">
                    Export Theme
                  </button>
                  <button class="footer-theme-drawer-background-btn" id="siteThemeImportButton" type="button">
                    Import Theme
                  </button>
                </div>
                <p class="footer-theme-drawer-background-status" id="siteThemeTransferStatus">
                  Export a theme to copy it, or paste exported theme data here to import it.
                </p>
              </div>
            </section>
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Background</h3>
              <div class="footer-theme-drawer-background">
                <label class="footer-theme-drawer-field" for="siteBackgroundUrl">
                  <span class="footer-theme-drawer-field-title">Custom background link</span>
                  <span class="footer-theme-drawer-field-note">PNG, JPG, GIF, WEBP, MP4, WEBM</span>
                  <input
                    class="footer-theme-drawer-input"
                    id="siteBackgroundUrl"
                    type="text"
                    placeholder="https://example.com/background.mp4"
                    spellcheck="false"
                    autocomplete="off"
                  >
                </label>
                <div class="footer-theme-drawer-background-actions">
                  <button class="footer-theme-drawer-background-btn is-primary" id="siteBackgroundApply" type="button">
                    Load Background
                  </button>
                  <button class="footer-theme-drawer-background-btn" id="siteBackgroundClear" type="button">
                    Clear
                  </button>
                </div>
                <p class="footer-theme-drawer-background-status" id="siteBackgroundStatus">
                  Paste an image or video link to use as the site background.
                </p>
              </div>
            </section>
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Surface Blur</h3>
              <div class="footer-theme-drawer-visibility">
                <label class="footer-theme-drawer-toggle" for="siteSurfaceBlurEnabled">
                  <span class="footer-theme-drawer-toggle-copy">
                    <span class="footer-theme-drawer-toggle-title">Turn tints into blur</span>
                    <span class="footer-theme-drawer-toggle-note">Applies to cards, promo, and featured panels.</span>
                  </span>
                  <input class="footer-theme-drawer-toggle-input" id="siteSurfaceBlurEnabled" type="checkbox">
                  <span class="footer-theme-drawer-toggle-ui" aria-hidden="true"></span>
                </label>
              </div>
              <div class="footer-theme-drawer-setting footer-theme-drawer-setting-stack">
                <div class="footer-theme-drawer-slider-head">
                  <span>Blur strength</span>
                  <span id="siteSurfaceBlurValue">12px</span>
                </div>
                <input
                  class="footer-outline-slider footer-theme-drawer-slider"
                  id="siteSurfaceBlurSlider"
                  type="range"
                  min="0"
                  max="24"
                  step="1"
                  value="12"
                  aria-label="Surface blur strength"
                >
              </div>
            </section>
            <section class="footer-theme-drawer-section">
              <h3 class="footer-theme-drawer-section-title">Outline</h3>
              <div class="footer-theme-drawer-setting">
                <input
                  class="footer-outline-slider footer-theme-drawer-slider"
                  id="siteOutlineSlider"
                  type="range"
                  min="0"
                  max="64"
                  step="1"
                  value="7"
                  aria-label="Site outline brightness"
                >
              </div>
              <button class="footer-theme-drawer-reset" id="siteThemeRestoreDefaults" type="button">
                <i class="fas fa-rotate-left" aria-hidden="true"></i>
                <span>Restore Defaults</span>
              </button>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
