<div class="custom-theme-editor" id="customThemeEditor">
  <div class="custom-theme-content custom-theme-content-inline">
    <p class="custom-theme-intro">Colors update live while you edit. Fonts and status colors now live on their own editor pages.</p>
    <div class="custom-theme-meta">
      <section class="custom-theme-group" aria-labelledby="customThemeGlobalTitle">
        <div class="custom-theme-group-head">
          <h3 class="custom-theme-group-title" id="customThemeGlobalTitle">Basics</h3>
          <p class="custom-theme-group-note">These change the overall site look.</p>
        </div>
        <div class="custom-theme-color-grid">
          <label class="custom-theme-color-field">
            <span class="custom-theme-color-head">
              <span class="custom-theme-color-title">Background</span>
              <span class="custom-theme-color-note">Main background color for the site</span>
            </span>
            <span class="custom-theme-color-control">
              <input class="custom-theme-color-input" id="customThemeBackgroundInput" type="color" value="#000000">
              <span class="custom-theme-color-value" id="customThemeBackgroundValue">#000000</span>
            </span>
          </label>
          <label class="custom-theme-color-field">
            <span class="custom-theme-color-head">
              <span class="custom-theme-color-title">Text</span>
              <span class="custom-theme-color-note">Default text color across the site</span>
            </span>
            <span class="custom-theme-color-control">
              <input class="custom-theme-color-input" id="customThemeTextInput" type="color" value="#FFFFFF">
              <span class="custom-theme-color-value" id="customThemeTextValue">#FFFFFF</span>
            </span>
          </label>
        </div>
      </section>
      <section class="custom-theme-group" aria-labelledby="customThemeBrandTitle">
        <div class="custom-theme-group-head">
          <h3 class="custom-theme-group-title" id="customThemeBrandTitle">Theme Colors</h3>
          <p class="custom-theme-group-note">These drive accents, buttons, and branding gradients.</p>
        </div>
        <div class="custom-theme-color-grid">
          <label class="custom-theme-color-field">
            <span class="custom-theme-color-head">
              <span class="custom-theme-color-title">Main Accent</span>
              <span class="custom-theme-color-note">Primary highlights, active states, and key accents</span>
            </span>
            <span class="custom-theme-color-control">
              <input class="custom-theme-color-input" id="customThemeMainInput" type="color" value="#3B82F6">
              <span class="custom-theme-color-value" id="customThemeMainValue">#3B82F6</span>
            </span>
          </label>
          <label class="custom-theme-color-field">
            <span class="custom-theme-color-head">
              <span class="custom-theme-color-title">Hover Accent</span>
              <span class="custom-theme-color-note">Used for hover states and the end of gradients</span>
            </span>
            <span class="custom-theme-color-control">
              <input class="custom-theme-color-input" id="customThemeHoverInput" type="color" value="#2563EB">
              <span class="custom-theme-color-value" id="customThemeHoverValue">#2563EB</span>
            </span>
          </label>
          <label class="custom-theme-color-field">
            <span class="custom-theme-color-head">
              <span class="custom-theme-color-title">Gradient Start</span>
              <span class="custom-theme-color-note">Logo, banner, and featured gradient starting color</span>
            </span>
            <span class="custom-theme-color-control">
              <input class="custom-theme-color-input" id="customThemeLogoInput" type="color" value="#60A5FA">
              <span class="custom-theme-color-value" id="customThemeLogoValue">#60A5FA</span>
            </span>
          </label>
        </div>
      </section>
    </div>
  </div>
</div>
